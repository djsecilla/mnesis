# mnesis — core single-service stack (Phase D3).
# Bring up:  docker compose up -d   (copy .env.example -> .env first to customize)
# The canonical store (pages, sources, .git) and the durable state.db live on the
# named volume `mnesis-data`; they survive `down` and are removed only by `down -v`.

services:
  mnesis:
    build: .
    image: mnesis:latest
    command: serve                       # entrypoint dispatch -> MCP server
    restart: unless-stopped
    # .env is gitignored; absent is fine — the defaults below still bring it up.
    env_file:
      - path: .env
        required: false
    environment:
      MNESIS_MCP_TRANSPORT: http
      MNESIS_ROOT: /data/mnesis
      MNESIS_MCP_HOST: 0.0.0.0
      MNESIS_MCP_PORT: "8080"            # internal bind; the HOST port is set via `ports`
      # Inference provider (default anthropic/stub). To run local-first inference,
      # set MNESIS_LLM_PROVIDER=local in .env and bring the stack up with
      # `--profile local-llm`. The base URL targets the `ollama` service below;
      # it is ignored unless the provider is "local".
      MNESIS_LLM_PROVIDER: ${MNESIS_LLM_PROVIDER:-anthropic}
      MNESIS_LLM_BASE_URL: ${MNESIS_LLM_BASE_URL:-http://ollama:11434}
      # Upload limit enforced by the ingestion endpoints; mnesis-ui mirrors it
      # into nginx's client_max_body_size so the two agree.
      MNESIS_MAX_UPLOAD_BYTES: ${MNESIS_MAX_UPLOAD_BYTES:-2000000}
    ports:
      # host ${MNESIS_MCP_PORT:-8080} -> container 8080.
      # The Web UI does NOT need this published — the browser talks only to the
      # mnesis-ui proxy, which reaches mnesis over the internal compose network.
      # It stays published so host-side agents can connect to the MCP endpoint at
      # http://localhost:8080/mcp; drop this line if no host agents connect.
      - "${MNESIS_MCP_PORT:-8080}:8080"
    volumes:
      - mnesis-data:/data/mnesis         # pages, sources, .git, and .index
    healthcheck:
      # /health is unauthenticated; python is already in the image (no curl needed).
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Web UI: static nginx serving the SPA + proxying /api to mnesis ----------
  # Started by a plain `docker compose up` (no profile). The browser talks ONLY
  # to this service; it reverse-proxies /api (and the SSE chat stream) to the
  # mnesis service over the internal network, injecting the bearer token
  # server-side. Stateless: no volume — all knowledge lives in mnesis.
  mnesis-ui:
    build: ./ui
    image: mnesis-ui:latest
    restart: unless-stopped
    depends_on:
      mnesis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # When set, nginx adds `Authorization: Bearer <token>` to proxied /api
      # requests so the browser never holds the token (see ui/nginx.conf).
      MNESIS_MCP_TOKEN: ${MNESIS_MCP_TOKEN:-}
      # Aligns nginx's client_max_body_size with the backend's upload limit so
      # multipart uploads pass through the proxy (entrypoint adds headroom).
      MNESIS_MAX_UPLOAD_BYTES: ${MNESIS_MAX_UPLOAD_BYTES:-2000000}
    ports:
      - "${MNESIS_UI_PORT:-3000}:80"
    healthcheck:
      # nginx:alpine ships busybox wget; probe the served index over IPv4
      # (busybox resolves "localhost" to ::1 first, which our server need not bind).
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- local-llm profile: opt-in local-first inference (data isolation) --------
  # NOT started by a plain `docker compose up`. Bring it up with:
  #   docker compose --profile local-llm up -d
  # and set MNESIS_LLM_PROVIDER=local (and MNESIS_LLM_MODEL=<an ollama tag>) in .env.
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama     # model weights persist here
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: wait for the server, then pull the configured model into the volume.
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    # Default to a SMALL model that fits modest hardware; override via MNESIS_LLM_MODEL.
    # Retry the pull: large models can hit a client deadline on the final manifest
    # step even after the blob downloads; a retry resumes from cache and completes.
    command:
      - 'until ollama list >/dev/null 2>&1; do echo "waiting for ollama..."; sleep 2; done;
         m="${MNESIS_LLM_MODEL:-llama3.2:1b}";
         for i in 1 2 3 4 5; do ollama pull "$$m" && break; echo "pull attempt $$i failed; retrying..."; sleep 3; done;
         ollama list && echo "model ready"'
    restart: "no"

  # --- maintenance profile: periodic upkeep sidecar ---------------------------
  # NOT started by a plain `up`. Bring it up with:
  #   docker compose --profile maintenance up -d
  # It shares the data volume with the server and runs decay / graph-lint --fix /
  # rebuild-if-missing on an interval, committing changes via the CLI (git-audited).
  # Phase 4 moves this into the app as event hooks; this sidecar can then retire.
  maintenance:
    build: .
    image: mnesis:latest
    profiles: ["maintenance"]
    command: maintenance
    restart: unless-stopped
    environment:
      MNESIS_ROOT: /data/mnesis
      MNESIS_MAINT_INTERVAL: ${MNESIS_MAINT_INTERVAL:-86400}   # default daily
      MNESIS_LLM_STUB: "1"              # upkeep commands never call the LLM
    volumes:
      - mnesis-data:/data/mnesis

  # --- Tier-B services (Phases 5-6) — PLACEHOLDER, intentionally not active -----
  # The core stack is single-service. When Phases 5-6 land (vector stream + RRF,
  # multi-agent mesh, workflow orchestration), these attach via the same env-driven
  # config and the GraphBackend/stream interfaces — no change to the core service.
  # Uncomment and wire as needed; keep secrets in .env, never here.
  #
  # postgres:                # Postgres + pgvector (vectors) + Apache AGE (Tier-B graph)
  #   image: ankane/pgvector:latest   # or an AGE-enabled image
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #
  # qdrant:                  # vector store (alternative to pgvector)
  #   image: qdrant/qdrant:latest
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #
  # redis:                   # caching / pub-sub for the multi-agent mesh
  #   image: redis:7-alpine
  #
  # temporal:                # durable workflow orchestration (automation/scheduler)
  #   image: temporalio/auto-setup:latest

volumes:
  mnesis-data:
  ollama-models:             # (local-llm) model weights; created only with the profile
  # postgres-data:           # (Tier-B) uncomment alongside the postgres service
  # qdrant-data:             # (Tier-B) uncomment alongside the qdrant service
