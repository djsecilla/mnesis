# mnesis — core single-service stack (Phase D3).
# Bring up:  docker compose up -d   (copy .env.example -> .env first to customize)
# The canonical store (pages, sources, .git) and the durable state.db live on the
# named volume `mnesis-data`; they survive `down` and are removed only by `down -v`.

services:
  mnesis:
    build: .
    image: mnesis:latest
    command: serve                       # entrypoint dispatch -> MCP server
    restart: unless-stopped
    # .env is gitignored; absent is fine — the defaults below still bring it up.
    env_file:
      - path: .env
        required: false
    environment:
      MNESIS_MCP_TRANSPORT: http
      MNESIS_ROOT: /data/mnesis
      MNESIS_MCP_HOST: 0.0.0.0
      MNESIS_MCP_PORT: "8080"            # internal bind; the HOST port is set via `ports`
      # DNS-rebinding-protection Host allowlist. Default permits the internal
      # service name (so the dockerized agent at mnesis:8080 isn't 421'd) plus
      # localhost (host-side agents). Override in .env to add more names.
      MNESIS_MCP_ALLOWED_HOSTS: ${MNESIS_MCP_ALLOWED_HOSTS:-mnesis:*,localhost:*,127.0.0.1:*}
      # Inference provider (default anthropic/stub). For local-first inference,
      # set MNESIS_LLM_PROVIDER=local in .env and run Ollama (or any OpenAI-
      # compatible server) on the HOST — the base URL below reaches it via
      # host.docker.internal. It is ignored unless the provider is "local".
      MNESIS_LLM_PROVIDER: ${MNESIS_LLM_PROVIDER:-anthropic}
      MNESIS_LLM_BASE_URL: ${MNESIS_LLM_BASE_URL:-http://host.docker.internal:11434}
      # Upload limit enforced by the ingestion endpoints; mnesis-ui mirrors it
      # into nginx's client_max_body_size so the two agree.
      MNESIS_MAX_UPLOAD_BYTES: ${MNESIS_MAX_UPLOAD_BYTES:-2000000}
    # Make the host reachable as host.docker.internal on Linux too (Docker
    # Desktop provides it automatically; harmless to declare explicitly).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # host ${MNESIS_MCP_PORT:-8080} -> container 8080.
      # The Web UI does NOT need this published — the browser talks only to the
      # mnesis-ui proxy, which reaches mnesis over the internal compose network.
      # It stays published so host-side agents can connect to the MCP endpoint at
      # http://localhost:8080/mcp; drop this line if no host agents connect.
      - "${MNESIS_MCP_PORT:-8080}:8080"
    volumes:
      - mnesis-data:/data/mnesis         # pages, sources, .git, and .index
    healthcheck:
      # /health is unauthenticated; python is already in the image (no curl needed).
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Web UI: static nginx serving the SPA + proxying /api to mnesis ----------
  # Started by a plain `docker compose up` (no profile). The browser talks ONLY
  # to this service; it reverse-proxies /api (and the SSE chat stream) to the
  # mnesis service over the internal network, injecting the bearer token
  # server-side. Stateless: no volume — all knowledge lives in mnesis.
  mnesis-ui:
    build: ./ui
    image: mnesis-ui:latest
    restart: unless-stopped
    depends_on:
      mnesis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # When set, nginx adds `Authorization: Bearer <token>` to proxied /api
      # requests so the browser never holds the token (see ui/nginx.conf).
      MNESIS_MCP_TOKEN: ${MNESIS_MCP_TOKEN:-}
      # Aligns nginx's client_max_body_size with the backend's upload limit so
      # multipart uploads pass through the proxy (entrypoint adds headroom).
      MNESIS_MAX_UPLOAD_BYTES: ${MNESIS_MAX_UPLOAD_BYTES:-2000000}
    ports:
      - "${MNESIS_UI_PORT:-3000}:80"
    healthcheck:
      # nginx:alpine ships busybox wget; probe the served index over IPv4
      # (busybox resolves "localhost" to ::1 first, which our server need not bind).
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- LangGraph agentic runtime (profile: agents) -----------------------------
  # NOT started by a plain `up`. Bring it up with:
  #   docker compose --profile agents up -d
  # Runs `mnesis-agents run` — the multi-LLM LangGraph foundation host. It
  # registers concrete agents over the internal MCP endpoint (it never imports the
  # core):
  #   1. the scheduled **dream-cycle MaintenanceAgent** — the SINGLE owner of
  #      periodic maintenance (the D5 `maintenance` sidecar is retired — see the
  #      note below): auto-applies safe hygiene (decay + safe graph fixes), queues
  #      contradiction/dedup proposals for review, and writes a report;
  #   2. the **notes-inbox WritingAgent** — watches the mounted /data/notes_inbox
  #      and ingests new/changed .md/.txt notes via mnesis_ingest (dedup +
  #      retry/backoff + dead-letter for poison items); and
  #   3. the **ActionAgent** — DRAFT-ONLY and approval-GATED: it composes a
  #      grounded, cited brief from Mnesis READ tools (read-only) and PROPOSES a
  #      delivery to the inert draft outbox. NOTHING is sent to a third party (no
  #      external-send channel exists → no external egress); a human approves at
  #      the gate to write the draft. Mostly on-demand (`agents action …` /
  #      `agents actions`); the periodic hook is opt-in.
  # Everything is governed; Mnesis's own redaction + routing + review gate every
  # write server-side. Durable agent state (checkpoints), the run audit, the
  # proposals queue, reports, the connector ledger, the dead-letter, and the action
  # proposals live on volumes; approved drafts land in the mounted action outbox.
  # Setting MNESIS_LLM_PROVIDER=local in .env keeps the WHOLE stack
  # (Mnesis + agents + model) on the host's Ollama — no external inference; neither
  # agent makes model calls (the dream cycle is deterministic; the writing agent
  # only calls mnesis_ingest, and Mnesis runs extraction on the local model).
  mnesis-agents-runtime:
    build: .
    image: mnesis:latest
    profiles: ["agents"]
    command: agents run
    restart: unless-stopped
    depends_on:
      mnesis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      MNESIS_MCP_URL: ${MNESIS_AGENTS_MCP_URL:-http://mnesis:8080/mcp}
      MNESIS_MCP_TOKEN: ${MNESIS_MCP_TOKEN:-}
      # Shared multi-LLM config — the SAME vars drive Mnesis and the agents layer.
      MNESIS_LLM_PROVIDER: ${MNESIS_LLM_PROVIDER:-anthropic}
      MNESIS_LLM_MODEL: ${MNESIS_LLM_MODEL:-}
      MNESIS_LLM_BASE_URL: ${MNESIS_LLM_BASE_URL:-http://host.docker.internal:11434}
      MNESIS_AGENTS_STUB: ${MNESIS_AGENTS_STUB:-}
      # Dream cycle: enabled by default (the single periodic-maintenance owner).
      MNESIS_AGENTS_DREAM_ENABLED: ${MNESIS_AGENTS_DREAM_ENABLED:-1}
      # Cadence. The bundled scheduler is interval-based; default ~daily (nightly).
      # Set lower for a smoke test; a precise cron (MNESIS_AGENTS_DREAM_CRON) needs
      # the APScheduler extra.
      MNESIS_AGENTS_DREAM_INTERVAL_SECONDS: ${MNESIS_AGENTS_DREAM_INTERVAL_SECONDS:-86400}
      # Meta-memory: file a digest of each cycle back into Mnesis. Default OFF.
      MNESIS_AGENTS_CRYSTALLIZE: ${MNESIS_AGENTS_CRYSTALLIZE:-}
      # Notes-inbox writing agent: watch the mounted inbox and ingest new/changed
      # .md/.txt notes into Mnesis over MCP (Mnesis redacts + routes server-side;
      # the agent makes no LLM calls, so local-llm stays fully on-prem). poll mode
      # is the container-friendly default (filesystem events across bind mounts can
      # be unreliable). Inbound note content is treated as DATA, never instructions.
      MNESIS_NOTES_ENABLED: ${MNESIS_NOTES_ENABLED:-1}
      MNESIS_NOTES_INBOX: /data/notes_inbox
      MNESIS_NOTES_MODE: ${MNESIS_NOTES_MODE:-poll}
      MNESIS_NOTES_POLL_INTERVAL: ${MNESIS_NOTES_POLL_INTERVAL:-5}
      # Action agent: DRAFT-ONLY and approval-GATED. It composes a grounded, cited
      # brief from Mnesis READ tools (read-only) and PROPOSES a delivery to the
      # inert draft outbox — NOTHING is sent to a third party (no external-send
      # channel exists, so this introduces NO external network egress). A human
      # approves at the gate (`agents actions approve <id>`) to write the draft.
      # Mostly on-demand (`agents action …`); set the schedule flag to enable the
      # periodic hook over a provided contexts file. local-llm keeps composition
      # on-prem (the agent makes no model calls; Mnesis composes via the local model).
      MNESIS_ACTION_OUTBOX: /data/action_outbox
      MNESIS_AGENTS_ACTION_CHANNEL: ${MNESIS_AGENTS_ACTION_CHANNEL:-draft-outbox}
      MNESIS_AGENTS_ACTIONS_SCHEDULE_ENABLED: ${MNESIS_AGENTS_ACTIONS_SCHEDULE_ENABLED:-}
      MNESIS_ACTIONS_CONTEXTS_FILE: ${MNESIS_ACTIONS_CONTEXTS_FILE:-}
      # Durable state + audit + proposals/reports + connector ledger + dead-letter
      # + action proposals on the mounted volumes.
      MNESIS_AGENTS_CHECKPOINT_DB: /data/agents_state/checkpoints.db
      MNESIS_AGENTS_AUDIT_DIR: /data/agents_runs
      MNESIS_AGENTS_PROPOSALS_DIR: /data/agents_runs
      MNESIS_AGENTS_CONNECTOR_STATE_DIR: /data/agents_runs/connectors
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mnesis-agents-state:/data/agents_state    # LangGraph checkpoints (resumable threads)
      - mnesis-agents-runs:/data/agents_runs       # run audit + proposals + reports + connector ledger + dead-letter
      # Drop .md/.txt notes here on the host to ingest them. Read-only: the writing
      # agent only reads notes (it ingests over MCP; the processed ledger lives on
      # the agents-runs volume, not here).
      - ${MNESIS_NOTES_INBOX_DIR:-./notes_inbox}:/data/notes_inbox:ro
      # The action agent writes approved DRAFTS here for a human to review/send by
      # hand. Read-write (drafts land here on approval); nothing is sent anywhere.
      - ${MNESIS_ACTION_OUTBOX_DIR:-./action_outbox}:/data/action_outbox
    healthcheck:
      # No HTTP server (idle host); "healthy" = it can reach mnesis over the net.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://mnesis:8080/health', timeout=3).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- local-first inference (opt-in) ------------------------------------------
  # mnesis can run inference on a LOCAL model server instead of Anthropic — set
  # MNESIS_LLM_PROVIDER=local in .env (and MNESIS_LLM_MODEL=<an Ollama tag>).
  # We use the HOST's Ollama (or any OpenAI-compatible server) rather than a
  # container: the base URL http://host.docker.internal:11434 (above) reaches it,
  # so there is no Ollama service here and no model-weights volume to manage.
  # Sources still never leave the machine. Ensure Ollama is running on the host
  # (`ollama serve`) and the model is pulled (`ollama pull <tag>`).

  # --- maintenance: RETIRED (superseded by the dream-cycle agent) -------------
  # The old `maintenance` profile — a sidecar that ran `mnesis decay` /
  # `graph-lint --fix` / rebuild-if-missing on an interval against the shared data
  # volume — has been REMOVED. Periodic maintenance now has exactly ONE owner: the
  # scheduled dream-cycle MaintenanceAgent in `mnesis-agents-runtime` (profile:
  # agents), which drives the same upkeep over MCP (decay + safe graph fixes
  # auto-applied; contradiction/dedup surfaced as proposals) and reports it.
  # Running both would double-run maintenance, so the sidecar is gone — bring up
  # `--profile agents` instead. (`docker compose run --rm mnesis cli decay` remains
  # available as a manual one-off; it is not a scheduler.)

  # --- Tier-B services (Phases 5-6) — PLACEHOLDER, intentionally not active -----
  # The core stack is single-service. When Phases 5-6 land (vector stream + RRF,
  # multi-agent mesh, workflow orchestration), these attach via the same env-driven
  # config and the GraphBackend/stream interfaces — no change to the core service.
  # Uncomment and wire as needed; keep secrets in .env, never here.
  #
  # postgres:                # Postgres + pgvector (vectors) + Apache AGE (Tier-B graph)
  #   image: ankane/pgvector:latest   # or an AGE-enabled image
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #
  # qdrant:                  # vector store (alternative to pgvector)
  #   image: qdrant/qdrant:latest
  #   volumes:
  #     - qdrant-data:/qdrant/storage
  #
  # redis:                   # caching / pub-sub for the multi-agent mesh
  #   image: redis:7-alpine
  #
  # temporal:                # durable workflow orchestration (automation/scheduler)
  #   image: temporalio/auto-setup:latest

volumes:
  mnesis-data:
  mnesis-agents-state:       # LangGraph checkpoints (resumable threads); --profile agents
  mnesis-agents-runs:        # LangGraph run audit (JSONL); --profile agents
  # postgres-data:           # (Tier-B) uncomment alongside the postgres service
  # qdrant-data:             # (Tier-B) uncomment alongside the qdrant service
