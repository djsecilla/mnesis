# mnesis web UI — static SPA + reverse proxy to the mnesis service.
# The browser only ever talks to this server (same origin); /api and the SSE
# chat stream are proxied to the mnesis container on the internal network.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the static assets (already-compressed images excluded by type list).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Fingerprinted build assets: cache hard (filenames change on every build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime config is intentionally uncached so a redeploy can repoint the UI.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # API + SSE -> the mnesis service. No trailing slash on proxy_pass so the
    # /api prefix is preserved (the gateway routes live under /api/*).
    location /api/ {
        proxy_pass http://mnesis:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Server-side bearer-token injection (empty file when no token is set).
        include /etc/nginx/auth_header.conf;

        # SSE: the grounded chat stream must flush token-by-token. Disable all
        # buffering/caching, keep the upstream connection open, and raise the
        # read/send timeouts so long answers are not cut off.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # SPA client-side routing: serve the file if it exists, else index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
